name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip artifact
        run: |
          zip -r hockey-tracker-${{ github.ref_name }}.zip custom_components/hockey_tracker/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hockey-tracker-${{ github.ref_name }}.zip
          generate_release_notes: true
